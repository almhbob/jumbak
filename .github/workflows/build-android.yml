name: Build Android APK

on:
  push:
    branches: [claude/app-admin-portal-review-QSQSt, main]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Android SDK + NDK 27
        run: |
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          yes | $SDKMANAGER --licenses 2>/dev/null || true
          $SDKMANAGER \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "ndk;27.1.12297006"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Expo prebuild (Android)
        working-directory: apps/mobile
        env:
          EXPO_PUBLIC_API_URL: https://jumbakserver-production.up.railway.app
          EXPO_NO_TELEMETRY: 1
        run: npx expo prebuild --platform android --clean

      - name: Make gradlew executable
        run: chmod +x apps/mobile/android/gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('apps/mobile/android/**/*.gradle*', 'apps/mobile/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Build release APK
        working-directory: apps/mobile/android
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m"
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.1.12297006
        run: ./gradlew assembleRelease --stacktrace

      - name: Find APK
        if: always()
        run: find apps/mobile/android/app/build/outputs -name "*.apk" 2>/dev/null || echo "No APK found"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: jnbk-release-apk
          path: apps/mobile/android/app/build/outputs/apk/release/*.apk
          retention-days: 30
