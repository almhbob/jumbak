name: Build Android APK

on:
  push:
    branches: [main, claude/repo-review-apk-build-ter5u4]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Android SDK + NDK 27
        run: |
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          yes | $SDKMANAGER --licenses 2>/dev/null || true
          $SDKMANAGER \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "ndk;27.1.12297006"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Expo prebuild (Android)
        working-directory: apps/mobile
        env:
          EXPO_PUBLIC_API_URL: https://jumbakserver-production.up.railway.app
          EXPO_NO_TELEMETRY: 1
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEYSTORE_ALIAS: ${{ secrets.KEYSTORE_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: npx expo prebuild --platform android --clean

      - name: Decode release keystore
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > apps/mobile/release.keystore
          else
            echo "⚠️  KEYSTORE_BASE64 secret not set — APK will be signed with debug key"
          fi

      - name: Make gradlew executable
        run: chmod +x apps/mobile/android/gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('apps/mobile/android/**/*.gradle*', 'apps/mobile/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Build release APK
        working-directory: apps/mobile/android
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m"
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.1.12297006
          SENTRY_DISABLE_AUTO_UPLOAD: true
          SENTRY_NO_PROGRESS_BAR: true
          EXPO_PUBLIC_API_URL: https://jumbakserver-production.up.railway.app
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEYSTORE_ALIAS: ${{ secrets.KEYSTORE_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --stacktrace

      - name: Find APK
        if: always()
        run: find apps/mobile/android/app/build/outputs -name "*.apk" 2>/dev/null || echo "No APK found"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: jnbk-release-apk
          path: apps/mobile/android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Upload APK to Gofile
        run: |
          APK=$(find apps/mobile/android/app/build/outputs/apk/release -name "*.apk" | head -1)
          if [ -z "$APK" ]; then echo "No APK found"; exit 1; fi
          SERVER=$(curl -s https://api.gofile.io/servers | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['data']['servers'][0]['name'])")
          RESULT=$(curl -s -F "file=@$APK" "https://${SERVER}.gofile.io/contents/uploadfile")
          echo "Gofile result: $RESULT"
          LINK=$(echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['data']['downloadPage'])")
          echo "✅ APK download link: $LINK"
          echo "GOFILE_LINK=$LINK" >> $GITHUB_ENV

      - name: Comment APK link in job summary
        run: |
          echo "## 📱 APK جاهز للتحميل" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**رابط التحميل:** $GOFILE_LINK" >> $GITHUB_STEP_SUMMARY
