name: Build Android APK

on:
  push:
    branches: [claude/app-admin-portal-review-QSQSt, main]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Android SDK + NDK
        run: |
          sdkmanager --install \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "platform-tools" \
            "ndk;26.1.10909125" \
          2>/dev/null || true
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Expo prebuild (Android)
        working-directory: apps/mobile
        env:
          EXPO_PUBLIC_API_URL: https://workspaceapi-server-production-3e22.up.railway.app
          EXPO_NO_TELEMETRY: 1
        run: npx expo prebuild --platform android --clean

      - name: Make gradlew executable
        run: chmod +x apps/mobile/android/gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('apps/mobile/android/**/*.gradle*', 'apps/mobile/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Build debug APK
        working-directory: apps/mobile/android
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m"
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_NDK_HOME: /usr/local/lib/android/sdk/ndk/26.1.10909125
        run: ./gradlew assembleDebug --stacktrace

      - name: Find APK
        if: always()
        run: find apps/mobile/android/app/build/outputs -name "*.apk" 2>/dev/null || echo "No APK found"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: jnbk-debug-apk
          path: apps/mobile/android/app/build/outputs/apk/**/*.apk
          retention-days: 30
