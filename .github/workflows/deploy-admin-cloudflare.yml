name: Deploy Admin to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - 'apps/admin/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-admin-cloudflare.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Build admin panel
        working-directory: apps/admin
        env:
          NEXT_PUBLIC_API_URL: https://jumbakserver-production.up.railway.app
        run: pnpm build

      - name: Create Pages project if missing
        run: npx wrangler pages project create jnbk-admin --production-branch=main 2>/dev/null || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: jnbk-admin
          directory: apps/admin/out
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
