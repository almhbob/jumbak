name: APK Gradle Release

on:
  workflow_dispatch:

jobs:
  apk:
    runs-on: ubuntu-latest
    env:
      EXPO_PUBLIC_API_URL: https://jumbakserver-production.up.railway.app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install
        working-directory: apps/mobile
        run: npm install --legacy-peer-deps
      - name: Prebuild
        working-directory: apps/mobile
        run: npx expo prebuild --platform android --clean --non-interactive
      - name: Build release APK
        working-directory: apps/mobile/android
        run: ./gradlew assembleRelease --no-daemon
      - name: Copy APK
        run: mkdir -p dist && cp apps/mobile/android/app/build/outputs/apk/release/app-release.apk dist/jnbk-release.apk
      - uses: actions/upload-artifact@v4
        with:
          name: jnbk-release-apk
          path: dist/jnbk-release.apk
