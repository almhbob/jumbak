name: APK Root Install Release

on:
  workflow_dispatch:

jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install all workspace dependencies at root
        run: npm install --workspaces --include-workspace-root --legacy-peer-deps
      - name: Prebuild mobile Android
        working-directory: apps/mobile
        run: npx expo prebuild --platform android --clean --non-interactive
      - name: Build release APK
        working-directory: apps/mobile/android
        run: ./gradlew assembleRelease --no-daemon
      - name: Copy APK
        run: mkdir -p dist && cp apps/mobile/android/app/build/outputs/apk/release/app-release.apk dist/jnbk-root-install-release.apk
      - uses: actions/upload-artifact@v4
        with:
          name: jnbk-root-install-release-apk
          path: dist/jnbk-root-install-release.apk
