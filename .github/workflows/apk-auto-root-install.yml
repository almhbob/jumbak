name: APK Auto Root Install

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/apk-auto-root-install.yml'
      - 'apps/mobile/**'
      - 'babel.config.js'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install root workspace dependencies
        run: npm install --workspaces --include-workspace-root --legacy-peer-deps
      - name: Prebuild Android
        working-directory: apps/mobile
        run: npx expo prebuild --platform android --clean --non-interactive
      - name: Build APK
        working-directory: apps/mobile/android
        run: ./gradlew assembleRelease --no-daemon
      - name: Upload APK
        run: mkdir -p dist && cp apps/mobile/android/app/build/outputs/apk/release/app-release.apk dist/jnbk-auto-root.apk
      - uses: actions/upload-artifact@v4
        with:
          name: jnbk-auto-root-apk
          path: dist/jnbk-auto-root.apk
