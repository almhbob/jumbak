name: Build APK Artifact

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/build-apk-github-artifact.yml'
      - 'apps/mobile/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    env:
      EXPO_PUBLIC_API_URL: https://jumbakserver-production.up.railway.app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install mobile dependencies
        working-directory: apps/mobile
        run: npm install --legacy-peer-deps

      - name: Prebuild Android project
        working-directory: apps/mobile
        run: npx expo prebuild --platform android --clean --non-interactive

      - name: Embed JavaScript bundle
        working-directory: apps/mobile
        run: npx expo export:embed --platform android --dev false --entry-file index.js --bundle-output android/app/src/main/assets/index.android.bundle --assets-dest android/app/src/main/res

      - name: Build debug APK
        working-directory: apps/mobile/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: |
          mkdir -p dist
          cp apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk dist/jnbk-rufaa-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: jnbk-rufaa-apk
          path: dist/jnbk-rufaa-debug.apk
          if-no-files-found: error
