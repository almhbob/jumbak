name: Deploy Server to Railway

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'pnpm-lock.yaml'
      - 'railway.json'
      - 'nixpacks.toml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Verify server builds
        run: |
          pnpm install --frozen-lockfile=false
          pnpm --filter @jumbak/server prisma:generate
          pnpm --filter @jumbak/server build

      - name: Trigger Railway deploy
        run: |
          if [ -z "$RAILWAY_DEPLOY_HOOK" ]; then
            echo "RAILWAY_DEPLOY_HOOK secret not set — skipping deploy trigger."
            echo "Set it in GitHub Secrets: Railway Project → Settings → Deploy Hooks → Generate Hook URL"
            exit 0
          fi
          HTTP_STATUS=$(curl -s -o /tmp/railway_response.json -w "%{http_code}" \
            -X POST "$RAILWAY_DEPLOY_HOOK")
          cat /tmp/railway_response.json
          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
            echo "Deploy triggered successfully (HTTP $HTTP_STATUS)"
          else
            echo "Deploy hook returned HTTP $HTTP_STATUS"
            exit 1
          fi
        env:
          RAILWAY_DEPLOY_HOOK: ${{ secrets.RAILWAY_DEPLOY_HOOK }}
