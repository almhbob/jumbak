name: Deploy Server to Railway

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'pnpm-lock.yaml'
      - 'railway.toml'
      - 'Dockerfile'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Verify server builds
        run: |
          pnpm install --frozen-lockfile=false
          pnpm --filter @jumbak/server prisma:generate
          pnpm --filter @jumbak/server build

      - name: Install Railway CLI
        run: npm install -g @railway/cli@latest

      - name: Deploy to Railway
        run: railway up --service api-server --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
