name: Build APK EAS Local

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/build-apk-eas-local.yml'
      - 'apps/mobile/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EXPO_PUBLIC_API_URL: https://jumbakserver-production.up.railway.app
      EAS_LOCAL_BUILD_SKIP_CLEANUP: '1'
      EAS_LOCAL_BUILD_WORKINGDIR: /tmp/eas-local-build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Build local APK with EAS
        working-directory: apps/mobile
        run: eas build --platform android --profile preview --local --non-interactive --output ../../dist/jnbk-rufaa-eas-local.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: jnbk-rufaa-eas-local-apk
          path: dist/jnbk-rufaa-eas-local.apk
          if-no-files-found: error
